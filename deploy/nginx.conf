upstream hope_backend {
    server unix:/run/gunicorn/hope.sock fail_timeout=0;
}

server {
    listen 80;
    server_name 157.245.110.252;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 157.245.110.252;

    ssl_certificate     /etc/ssl/certs/hope.crt;
    ssl_certificate_key /etc/ssl/private/hope.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    access_log /var/log/nginx/hope_access.log;
    error_log  /var/log/nginx/hope_error.log;

    location /static/ {
        alias /var/www/hope-backend/static/;
    }

    location /media/ {
        alias /var/www/hope-backend/media/;
    }

    location / {
        proxy_pass http://hope_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
